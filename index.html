  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- JSON-LD Structured Data: Organization with Logo (for Google Search) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Conflux AI",
    "url": "https://confluxai.in",
    "logo": {
      "@type": "ImageObject",
      "url": "https://confluxai.in/logo.png",
      "width": 512,
      "height": 512
    },
    "sameAs": [
      "https://www.instagram.com/conflux.ai",
      "https://www.linkedin.com/company/conflux-ai"
    ],
    "description": "Conflux AI builds visually stunning websites, AI-chatbots, and high-velocity ad systems.",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "availableLanguage": ["English", "Hindi"]
    }
  }
  </script>
</head>

<body>
  <div id="fallback-ui">
    <div class="font-orbitron text-2xl font-bold mb-4">CONFLUX <span class="text-blue-500">AI</span></div>
    <span class="loader"></span>
    <div id="loading-text" class="text-slate-400 text-[10px] font-orbitron tracking-[0.3em] uppercase">Initializing
      Neural Core...</div>
    <div id="error-log"
      class="mt-8 text-red-400 text-[10px] font-mono max-w-md text-left overflow-auto max-h-40 border-t border-white/5 pt-4">
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/index.tsx"></script>

  <script>
    window.onerror = function (msg, url, line) {
      const log = document.getElementById('error-log');
      if (log) {
        log.innerHTML += `<div style="margin-bottom:4px;">[BOOT_ERROR] ${msg} <br/><span style="opacity:0.5; font-size:8px;">Location: ${url}:${line}</span></div>`;
      }
      return false;
    };

    // Final fallback if the app hangs without a hard error
    setTimeout(() => {
      const loader = document.getElementById('fallback-ui');
      if (loader && !loader.classList.contains('hidden')) {
        console.warn("Conflux AI: Boot timeout. Forcing UI reveal...");
        const statusText = document.getElementById('loading-text');
        if (statusText) statusText.innerText = "Connection Slow - Finalizing Interface...";
      }
    }, 10000);
  </script>
</body>

</html>
